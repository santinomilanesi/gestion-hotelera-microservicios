spring.application.name=habitacion-service
server.port=8083

# Conexión a Eureka 
eureka.client.service-url.defaultZone=${EUREKA_URI:http://discovery-server:8761/eureka/}

# Configuración Swagger
springdoc.api-docs.path=/v3/api-docs

# Configuración PostgreSQL 
spring.datasource.url=jdbc:postgresql://postgres-db:5432/hotel_db
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user_hotel}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password_hotel}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.main.allow-bean-definition-overriding=true

eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${spring.application.name}