spring.application.name=usuario-service
# Puerto interno del contenedor
server.port=8082

# Conexión a Eureka (Usamos el nombre del servicio discovery-server)
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka/

# Configuración Swagger
springdoc.api-docs.path=/v3/api-docs

# Configuración PostgreSQL
spring.datasource.url=jdbc:postgresql://postgres-db:5432/hotel_db
spring.datasource.username=user_hotel
spring.datasource.password=password_hotel

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.main.allow-bean-definition-overriding=true

# Dialecto para evitar errores de metadata
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

eureka.instance.prefer-ip-address=false
eureka.instance.hostname=${spring.application.name}